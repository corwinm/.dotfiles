# set -g default-terminal "tmux-256color"
set -g default-terminal "xterm-ghostty"
set -s escape-time 0

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v

# resize panes with hjkl
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

set -g base-index 1
set -g set-titles on

# Enable focus events to allow tmux to detect when it gains or loses focus (pi-tmux-focus-cursor)
set -g focus-events on

set-window-option -g mode-keys vi
# Use v to trigger selection    
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use y to yank current selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

set -g extended-keys on
set -g extended-keys-format csi-u

# DESIGN TWEAKS

# Allow for images to be displayed
set -gq allow-passthrough on
set -g visual-activity off

# don't do anything when a 'bell' rings
# set -g visual-bell off
# set -g visual-silence off
# setw -g monitor-activity off
# set -g bell-action none

# statusbar
set -g status-position top

# Set up default flavor
set -g @catppuccin_flavor "macchiato"

# Automatically switch themes when system appearance changes.
# @catppuccin_reset doesn't unset per-module bg/color vars (set with -ogqF,
# evaluated to hex at load time), so we unset them manually here.
# _icon_fg is NOT unset -- it's pinned once below to #{E:@thm_fg} which
# catppuccin (-ogqF) never overwrites, and which evaluates dynamically at
# render time: dark in latte, light in macchiato.
set-hook -g client-dark-theme {
    set -g @catppuccin_flavor "macchiato"
    set -g @catppuccin_reset "true"
    set -gu @catppuccin_application_color
    set -gu @catppuccin_status_application_text_fg ; set -gu @catppuccin_status_application_icon_bg
    set -gu @catppuccin_status_session_text_fg ; set -gu @catppuccin_status_session_icon_bg
    set -gu @catppuccin_directory_color
    set -gu @catppuccin_status_directory_text_fg ; set -gu @catppuccin_status_directory_icon_bg
    set -gu @catppuccin_cpu_color ; set -gu @catppuccin_status_cpu_icon_bg
    set -gu @catppuccin_status_agents_text_fg
    run 'sh -c "~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux && ~/.tmux/plugins/coding-agents-tmux/coding-agents-tmux.tmux && tmux refresh-client -S"'
}
set-hook -g client-light-theme {
    set -g @catppuccin_flavor "latte"
    set -g @catppuccin_reset "true"
    set -gu @catppuccin_application_color
    set -gu @catppuccin_status_application_text_fg ; set -gu @catppuccin_status_application_icon_bg
    set -gu @catppuccin_status_session_text_fg ; set -gu @catppuccin_status_session_icon_bg
    set -gu @catppuccin_directory_color
    set -gu @catppuccin_status_directory_text_fg ; set -gu @catppuccin_status_directory_icon_bg
    set -gu @catppuccin_cpu_color ; set -gu @catppuccin_status_cpu_icon_bg
    set -gu @catppuccin_status_agents_text_fg
    run 'sh -c "~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux && ~/.tmux/plugins/coding-agents-tmux/coding-agents-tmux.tmux && tmux refresh-client -S"'
}

set -g @catppuccin_window_status_style "rounded"

# Pin module icon_fg to a conditional format string catppuccin's -ogqF never
# overwrites. Evaluates dynamically at render time:
#   dark mode  -> @thm_crust (very dark, original catppuccin behavior)
#   light mode -> @thm_fg    (dark in latte #4c4f69, consistent dark icons)
set -g @catppuccin_status_application_icon_fg "#{?#{==:#{client_theme},dark},#{E:@thm_crust},#{E:@thm_fg}}"
set -g @catppuccin_status_session_icon_fg "#{?#{==:#{client_theme},dark},#{E:@thm_crust},#{E:@thm_fg}}"
set -g @catppuccin_status_directory_icon_fg "#{?#{==:#{client_theme},dark},#{E:@thm_crust},#{E:@thm_fg}}"
set -g @catppuccin_status_cpu_icon_fg "#{?#{==:#{client_theme},dark},#{E:@thm_crust},#{E:@thm_fg}}"

# Manual install (recommended over TPM due to name conflicts)
if "test ! -d ~/.config/tmux/plugins/catppuccin" \
   "run 'mkdir -p ~/.config/tmux/plugins/catppuccin && git clone -b v2.3.0 https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin/tmux'"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_agents}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'corwinm/coding-agents-tmux'
set -g @coding-agents-tmux-auto-install 'opencode,pi,codex,claude'
set -g @coding-agents-tmux-status-color-neutral 'default'
set -g @coding-agents-tmux-status-color-idle 'colour244'
set -g @coding-agents-tmux-status-color-busy 'colour81'
set -g @coding-agents-tmux-status-color-waiting 'colour214'
set -g @coding-agents-tmux-status-color-unknown 'colour240'
# Trying out just using sesh and not tmux-resurrect/continuum for now
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g status-bg default
set -g status-style bg=default

# set-option -g allow-rename off
# set-window-option -g window-status-format '#I:#W'
# set-window-option -g window-status-current-format '#I:#W'
# set-option -g automatic-rename-format '#{pane_current_command}'

# sesh integration
bind-key "K" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Recomended sesh tmux config https://github.com/joshmedeski/sesh?tab=readme-ov-file#recommended-tmux-settings
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
